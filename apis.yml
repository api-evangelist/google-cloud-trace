apis:
  - name: Google Cloud Trace API
    description: >-
      The Cloud Trace API enables sending and retrieving latency data for
      distributed applications. The v2 API supports writing trace spans via
      batchWrite and createSpan methods, while the v1 API supports both reading
      and writing trace data including listing and getting traces.
