aid: google-cloud-trace
name: Google Cloud Trace
description: >-
  Google Cloud Trace is a distributed tracing system that collects latency data
  from applications and displays it in near real-time. It helps developers
  understand how requests propagate through their application, identify
  performance bottlenecks, and analyze latency across microservices and
  distributed architectures running on Google Cloud.
